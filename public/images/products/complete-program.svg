<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDF8"/>
      <stop offset="100%" style="stop-color:#E2DDF0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#B08D4F"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Background glow -->
  <circle cx="300" cy="255" r="155" fill="#C9A96E" opacity="0.07"/>
  <!-- Box/package -->
  <rect x="185" y="200" width="230" height="170" rx="16" fill="url(#dark)"/>
  <!-- Box lid -->
  <rect x="180" y="185" width="240" height="38" rx="10" fill="url(#gold)"/>
  <!-- Box ribbon vertical -->
  <rect x="290" y="185" width="20" height="185" rx="4" fill="url(#gold)" opacity="0.6"/>
  <!-- Box ribbon horizontal -->
  <rect x="185" y="258" width="230" height="16" rx="4" fill="url(#gold)" opacity="0.5"/>
  <!-- Bow -->
  <ellipse cx="285" cy="185" rx="28" ry="16" fill="url(#gold)" transform="rotate(-20 285 185)"/>
  <ellipse cx="315" cy="185" rx="28" ry="16" fill="url(#gold)" transform="rotate(20 315 185)"/>
  <circle cx="300" cy="185" r="12" fill="url(#gold)"/>
  <!-- Small product icons on box face -->
  <rect x="210" y="230" width="28" height="40" rx="6" fill="#C9A96E" opacity="0.6"/>
  <rect x="248" y="225" width="20" height="45" rx="6" fill="#B08D4F" opacity="0.5"/>
  <ellipse cx="295" cy="265" rx="18" ry="22" fill="#C9A96E" opacity="0.5"/>
  <!-- Stars -->
  <text x="152" y="215" font-family="sans-serif" font-size="18" fill="#C9A96E" opacity="0.5">★</text>
  <text x="430" y="240" font-family="sans-serif" font-size="14" fill="#C9A96E" opacity="0.4">★</text>
  <text x="165" y="330" font-family="sans-serif" font-size="14" fill="#C9A96E" opacity="0.35">✦</text>
  <text x="425" y="340" font-family="sans-serif" font-size="18" fill="#C9A96E" opacity="0.4">★</text>
  <!-- Badge -->
  <rect x="355" y="290" width="70" height="26" rx="13" fill="url(#gold)"/>
  <text x="390" y="307" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">وفري 20%</text>
  <!-- Text -->
  <text x="300" y="420" font-family="sans-serif" font-size="19" font-weight="bold" fill="#1A1A2E" text-anchor="middle">البرنامج الكامل</text>
  <text x="300" y="450" font-family="sans-serif" font-size="14" fill="#B08D4F" text-anchor="middle">Complete Treatment Program</text>
  <text x="300" y="480" font-family="sans-serif" font-size="13" fill="#C9A96E" text-anchor="middle" opacity="0.8">نوفيا كلينيك</text>
  <rect x="120" y="500" width="360" height="3" rx="2" fill="url(#gold)" opacity="0.4"/>
</svg>
