<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F3ED"/>
      <stop offset="100%" style="stop-color:#E8D5B7"/>
    </linearGradient>
    <linearGradient id="circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#B08D4F"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Decorative rings -->
  <circle cx="300" cy="270" r="160" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="270" r="130" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.2"/>
  <!-- Center circle -->
  <circle cx="300" cy="270" r="100" fill="url(#circle)" opacity="0.15"/>
  <!-- Bottle icon -->
  <rect x="265" y="190" width="70" height="100" rx="12" fill="#C9A96E" opacity="0.9"/>
  <rect x="278" y="176" width="44" height="22" rx="6" fill="#B08D4F"/>
  <rect x="290" y="165" width="20" height="14" rx="4" fill="#C9A96E"/>
  <!-- Brush icon -->
  <rect x="310" y="230" width="16" height="60" rx="4" fill="#B08D4F" opacity="0.8"/>
  <ellipse cx="318" cy="300" rx="12" ry="8" fill="#C9A96E"/>
  <!-- Shine effect -->
  <ellipse cx="278" cy="210" rx="8" ry="14" fill="white" opacity="0.3" transform="rotate(-20 278 210)"/>
  <!-- Product name -->
  <text x="300" y="410" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1A1A2E" text-anchor="middle">كيت مضاد للسيلوليت</text>
  <text x="300" y="440" font-family="sans-serif" font-size="15" fill="#B08D4F" text-anchor="middle">Anti-Cellulite Kit</text>
  <!-- Brand -->
  <text x="300" y="480" font-family="sans-serif" font-size="13" fill="#C9A96E" text-anchor="middle" opacity="0.8">نوفيا كلينيك</text>
  <!-- Bottom bar -->
  <rect x="120" y="500" width="360" height="3" rx="2" fill="url(#circle)" opacity="0.4"/>
</svg>
